# ---------------------------------------------------------------------------
# docker-compose.yml — CryptoSim: Bitcoin-style PoW simulation
#
# Services:
#   node       — Blockchain authority + live web dashboard  (localhost:8182)
#   miner_1…10 — Up to 10 mining containers (ports 8001-8010)
#
# All services share the 'crypto_net' bridge network so they reach each
# other by Docker service name  (e.g. http://node:8182, http://miner_1:8001).
#
# The number of miners and difficulty are chosen at runtime through the
# web dashboard at http://localhost:8182 — no need to edit this file.
#
# NUM_BLOCKS — How many blocks to mine before the simulation ends.
# ---------------------------------------------------------------------------

networks:
  crypto_net:
    driver: bridge

services:

  # ---------- Blockchain Node ----------------------------------------------
  node:
    build: .
    command: uvicorn node:app --host 0.0.0.0 --port 8182 --log-level warning
    ports:
      - "8182:8182"     # Dashboard + API accessible at http://localhost:8182
    environment:
      NUM_BLOCKS: 10
    networks:
      - crypto_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8182/chain', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------- Miners 1-10 --------------------------------------------------
  miner_1:
    build: .
    command: uvicorn miner:app --host 0.0.0.0 --port 8001 --log-level warning
    ports:
      - "8001:8001"
    environment:
      NODE_URL:   http://node:8182
      MINER_ID:   miner_1
      MINER_URL:  http://miner_1:8001
    networks:
      - crypto_net
    depends_on:
      - node

  miner_2:
