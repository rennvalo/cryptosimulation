# ---------------------------------------------------------------------------
# docker-compose.yml — CryptoSim: Bitcoin-style PoW simulation
#
# Services:
#   node       — Blockchain authority + live web dashboard  (localhost:8182)
#   miner_1…10 — Up to 10 mining containers (ports 8183-8192)
#
# All services share the 'crypto_net' bridge network so they reach each
# other by Docker service name  (e.g. http://node:8182, http://miner_1:8183).
#
# The number of miners and difficulty are chosen at runtime through the
# web dashboard at http://localhost:8182 — no need to edit this file.
#
# NUM_BLOCKS — How many blocks to mine before the simulation ends.
# ---------------------------------------------------------------------------

networks:
  crypto_net:
    driver: bridge
  frontend:
    external: true  # Ensure this matches an existing external network

services:

  # ---------- Blockchain Node ----------------------------------------------
  node:
    build: .
    command: uvicorn node:app --host 0.0.0.0 --port 8182 --log-level warning
    ports:
      - "8182:8182"     # Dashboard + API accessible at http://localhost:8182
    environment:
      NUM_BLOCKS: 10
    volumes:
      - crypto_data:/app/data   # SQLite DB — persists wallets and blockchain across restarts
    networks:
      - crypto_net
      - frontend  # Same network as Nginx Proxy Manager
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8182/chain', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------- Miners 1-10 --------------------------------------------------
  miner_1:
    build: .
    command: uvicorn miner:app --host 0.0.0.0 --port 8183 --log-level warning
    ports:
      - "8183:8183"
    environment:
      NODE_URL:   http://node:8182
      MINER_ID:   miner_1
      MINER_URL:  http://miner_1:8183
    networks:
      - crypto_net
    depends_on:
      - node

  miner_2:
    build: .
    command: uvicorn miner:app --host 0.0.0.0 --port 8184 --log-level warning
    ports:
      - "8184:8184"
    environment:
      NODE_URL:   http://node:8182
      MINER_ID:   miner_2
      MINER_URL:  http://miner_2:8184
    networks:
      - crypto_net
    depends_on:
      - node

  miner_3:
